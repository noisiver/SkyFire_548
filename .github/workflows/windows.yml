name: windows-build

on:
  push:
    branches: [ main, trunk, movement, boost_conversion, game_refine, handler_refine ]
    paths-ignore:
      - 'sql/**'
      
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


env:
  BUILD_TYPE: RelWithDebInfo
  BOOST_VERSION: 1.91.0
  BOOST_ROOT: C:\local\boost_1_91_0
  OPENSSL_ROOT_DIR: C:\Program Files\OpenSSL
  OPENSSL_MODULES: C:\Program Files\OpenSSL\bin
  OPENSSL_LIB_LEGACY: C:\Program Files\OpenSSL\lib\VC\x64\MD\liblegacy.lib
  REPO_DIR: ${{ github.workspace }}
  BUILD_DIR: ${{ github.workspace }}\bin\builddir
    
jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - uses: FranzDiebold/github-env-vars-action@v2

    - name: Check game source tabs
      shell: pwsh
      run: ./tools/dev/game_metrics.ps1 -CheckNoTabs

    - name: Create Build Environment
      shell: pwsh
      run: |
        "ARCHIVE_FILENAME=$env:CI_REPOSITORY_NAME-$env:CI_SHA_SHORT.zip" >> $env:GITHUB_ENV
        cmake -E make_directory ${{ env.BUILD_DIR }}

    - name: windows dependencies
      shell: pwsh
      run: |
        function Install-ChocoPackage {
          param(
            [Parameter(Mandatory = $true)]
            [string] $PackageName,
            [string[]] $PackageArgs = @()
          )

          for ($attempt = 1; $attempt -le 3; ++$attempt) {
            choco install -y $PackageName @PackageArgs --no-progress
            if ($LASTEXITCODE -eq 0) {
              return
            }

            if ($attempt -eq 3) {
              exit $LASTEXITCODE
            }

            Start-Sleep -Seconds (30 * $attempt)
          }
        }

        Install-ChocoPackage -PackageName make
        Install-ChocoPackage -PackageName cmake -PackageArgs @("--pre")
        Install-ChocoPackage -PackageName openssl -PackageArgs @("--version=4.0.0")

    - name: Cache Boost
      id: boost-cache
      uses: actions/cache@v4
      with:
        path: ${{ env.BOOST_ROOT }}
        key: boost-${{ env.BOOST_VERSION }}-windows

    - name: Install Boost
      if: steps.boost-cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $boostSource = Join-Path $env:RUNNER_TEMP "boost_1_91_0"
        $boostArchive = Join-Path $env:RUNNER_TEMP "boost_1_91_0.7z"
        Invoke-WebRequest -Uri "https://archives.boost.io/release/$env:BOOST_VERSION/source/boost_1_91_0.7z" -OutFile $boostArchive
        7z x $boostArchive "-o$env:RUNNER_TEMP" -y
        Push-Location $boostSource
        try {
          .\bootstrap.bat
          .\b2.exe install --prefix="$env:BOOST_ROOT" --with-headers -j2
        } finally {
          Pop-Location
        }

    - name: windows configure with PCH
      shell: pwsh
      run: |
        cmake -S "$env:GITHUB_WORKSPACE" -B "$env:BUILD_DIR" `
          -A x64 `
          -DTOOLS=ON `
          -DUSE_COREPCH=ON `
          -DUSE_SCRIPTPCH=ON `
          -DSKYFIRE_BUILD_TESTS=ON `
          -DBOOST_ROOT="$env:BOOST_ROOT" `
          -DOPENSSL_ROOT_DIR="$env:OPENSSL_ROOT_DIR"

    - name: windows build with PCH
      shell: pwsh
      run: |
        cmake --build "$env:BUILD_DIR" --config "$env:BUILD_TYPE" --parallel 4

    - name: windows tests
      shell: pwsh
      run: |
        ctest --test-dir "$env:BUILD_DIR" -C "$env:BUILD_TYPE" --output-on-failure

    - name: Create Upload File Name
      shell: pwsh
      run: |
        "ARCHIVE_FILENAME=${{ github.event.repository.name }}-$(git rev-parse --short HEAD).zip" >> $env:GITHUB_ENV
      
